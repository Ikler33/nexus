[workspace]
resolver = "2"
members = ["apps/desktop/src-tauri"]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.77"
license = "MIT"

# Общие версии зависимостей монорепо (расширяется по мере появления крейтов/срезов).
[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true

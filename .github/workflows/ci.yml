name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:coverage  # тесты + coverage-гейт (V1.2): пороги в vitest.config.ts (храповик «не ниже»)
      - run: pnpm build

  rust:
    name: Rust (build · clippy · test)
    strategy:
      fail-fast: false
      # Экономия минут Actions: на PR — ubuntu+windows (macOS = ×10 минут на приватном репо!);
      # на push в main — полная матрица ×3 ОС (ловим macOS-специфику до релиза).
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: cargo fmt --all -- --check
      - run: cargo build --locked
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked

  # Security-gate (ревью B6 / AC-Q-5): supply-chain + secret-scan отдельным required-job,
  # чтобы проверки безопасности не тонули в общем cargo test. Дёшево, без матрицы ОС.
  security:
    name: Security (supply-chain · secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks нужна полная история для diff-диапазона <sha>^..<sha> (shallow → unknown revision)
      - name: cargo-deny (advisories · licenses · bans · sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          manifest-path: Cargo.toml
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Coverage-ратчет Rust (V1.2, TESTING_STRATEGY §6): cargo-llvm-cov, глобальный floor по строкам.
  # Бежит параллельно rust-матрице (не добавляет wall-clock). Floor — мягкий старт ниже baseline
  # (локально 71.8% строк); ужесточение + per-path пороги критичных модулей — после подтверждения
  # CI-Linux baseline (см. BACKLOG «Coverage-доводка»). Frontend-покрытие — в job frontend (vitest).
  coverage-rust:
    name: Coverage (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: cargo llvm-cov --locked --workspace --summary-only --fail-under-lines 65

  # Traceability-гейт (V1.3, TESTING_STRATEGY §4): у КАЖДОГО AC из ACCEPTANCE.md есть запись в
  # docs/acceptance/traceability.json (статус covered/partial/pending/manual/deferred + tests).
  # Новый AC без записи о тесте → красный CI. Zero-dep (node:fs) — без pnpm install, ~10с.
  traceability:
    name: Traceability (AC ↔ тест)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Traceability + существование имён tests[] (#4а) + гейт #[ignore] (#4б) + синк версии (#7).
      - run: node scripts/check-traceability.mjs
      - run: node scripts/check-ignored.mjs
      - run: node scripts/check-versions.mjs

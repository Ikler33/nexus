name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:coverage  # тесты + coverage-гейт (V1.2): пороги в vitest.config.ts (храповик «не ниже»)
      - run: pnpm build

  rust:
    name: Rust (build · clippy · test)
    strategy:
      fail-fast: false
      # Экономия минут Actions: на PR — ubuntu+windows (macOS = ×10 минут на приватном репо!);
      # на push в main — полная матрица ×3 ОС (ловим macOS-специфику до релиза).
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: cargo fmt --all -- --check
      - run: cargo build --locked --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Тесты. ubuntu/macOS — ПОЛНЫЙ набор воркспейса (вкл. nexus-desktop: ~217 unit + integration).
      - name: cargo test (full workspace)
        if: matrix.os != 'windows-latest'
        run: cargo test --locked --workspace
      # Windows — портативные крейты ТОЛЬКО (nexus-core/nexus-agentd), nexus-desktop ИСКЛЮЧЁН.
      # Почему: lib-test бинарь nexus-desktop (Tauri-app крейт) на headless windows-latest падает на
      # ЗАГРУЗКЕ процесса с 0xC0000139 STATUS_ENTRYPOINT_NOT_FOUND — линкуется WebView2Loader/webkit
      # нативщина, и одна из DLL присутствует, но не экспортирует импортируемую точку входа. Это
      # происходит ДО запуска любого теста (логики-бага нет). desktop-крейт всё равно ПОЛНОСТЬЮ
      # компилируется (`cargo build --workspace`) и линтуется (`cargo clippy --workspace`) на Windows —
      # пропускаем ТОЛЬКО исполнение его незагружаемого тест-бинаря. Его тесты гоняются на ubuntu/macOS.
      # См. PR fix/windows-ci-desktop-testbin. Альтернатива (поставить WebView2-runtime в headless
      # раннер) хрупка и не покрывает webkit-линк — отклонена.
      - name: cargo test (exclude nexus-desktop — Tauri lib-test exe can't load on headless Windows)
        if: matrix.os == 'windows-latest'
        run: cargo test --locked --workspace --exclude nexus-desktop

  # Security-gate (ревью B6 / AC-Q-5): supply-chain + secret-scan отдельным required-job,
  # чтобы проверки безопасности не тонули в общем cargo test. Дёшево, без матрицы ОС.
  # cargo-deny — бинарником с GitHub Releases (taiki-e/install-action, как cargo-llvm-cov в
  # coverage-job), НЕ docker-экшеном: cargo-deny-action@v2 собирал образ с Docker Hub и дважды
  # падал на его i/o-таймаутах (инцидент 2026-06-10) — убрана целая категория флака. Сама
  # проверка идентична: `cargo deny check` с тем же deny.toml.
  security:
    name: Security (supply-chain · secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks нужна полная история для diff-диапазона <sha>^..<sha> (shallow → unknown revision)
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - name: cargo-deny (advisories · licenses · bans · sources)
        run: cargo deny check
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Coverage-ратчет Rust (TESTING_STRATEGY §6 / AC-Q-2): cargo-llvm-cov → per-module гейт
  # scripts/check-coverage.mjs (глобальный floor + per-path пороги критичных модулей: indexer/chunker/
  # search/broker/permission/watcher/eval). Floor'ы — в coverage-baseline.json (ратчет «не ниже», с
  # запасом под macOS↔Linux). Бежит параллельно rust-матрице. Frontend-покрытие — в job frontend (vitest).
  coverage-rust:
    name: Coverage (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: cargo llvm-cov --locked --workspace --json --output-path coverage.json
      - name: Per-module coverage gate (ratchet)
        run: node ../../../scripts/check-coverage.mjs coverage.json

  # De-risk бандлинга (кросс-план #3): CI гонял только cargo build/test — «бандлится ли приложение»
  # (иконки/ресурсы/desktop-файлы/deb-пакет) было неизвестно и могло тихо сломаться. Только push в
  # main (дорого ~10 мин, PR не тормозим) и только deb: appimage/dmg капризны в headless-средах
  # (локальный macOS-прогон 2026-06-10: .app собрался, dmg-шаг bundle_dmg.sh упал — см. BACKLOG).
  bundle-debug:
    name: Bundle smoke (tauri build --debug, deb)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Tauri system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: pnpm --dir apps/desktop exec tauri build --debug --bundles deb
      - name: Бандл существует (deb)
        run: ls -l target/debug/bundle/deb/*.deb

  # Traceability-гейт (V1.3, TESTING_STRATEGY §4): у КАЖДОГО AC из ACCEPTANCE.md есть запись в
  # docs/acceptance/traceability.json (статус covered/partial/pending/manual/deferred + tests).
  # Новый AC без записи о тесте → красный CI. Zero-dep (node:fs) — без pnpm install, ~10с.
  traceability:
    name: Traceability (AC ↔ тест)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Traceability + существование имён tests[] (#4а) + гейт #[ignore] (#4б) + синк версии (#7)
      # + egress-chokepoint (AC-EGR-1: голый reqwest-билдер вне net/ → красный CI)
      # + tooluse-chokepoint (I-5/AGENT-1: OpenAiToolProvider вне ai/tools.rs+agent/+agentd → красный CI)
      # + agent-memory-funnel (AGENT-MEM-1: сырой memory::add в agent/ вне agent/memory.rs → красный CI)
      # + висячие упоминания снятых решений (AC-Q-6: sqlite-vec/petgraph/wasmtime/currentFile).
      - run: node scripts/check-traceability.mjs
      - run: node scripts/check-ignored.mjs
      - run: node scripts/check-versions.mjs
      - run: node scripts/check-egress.mjs
      - run: node scripts/check-tooluse.mjs
      - run: node scripts/check-agent-memory.mjs
      - run: node scripts/check-dangling.mjs
      # + INV-CMD-SITE (SANDBOX-6c-2): process::Command для exec агента только в sandbox/exec_child.rs.
      - run: node scripts/check-sandbox-exec.mjs

# gitleaks — конфиг secret-scan (V1.1, ревью B6).
# Базовые правила gitleaks + allowlist путей, где живут ПЛЕЙСХОЛДЕРЫ (примеры в доках/тестах),
# а не настоящие секреты. Реальные секреты в репозиторий не попадают: git-токен и LLM-ключи
# хранятся в системном keychain (AC-SEC-3), не на диске. Принцип «no silent caps»: allowlist узкий
# и обоснованный — если понадобится исключить ещё путь, добавлять с комментарием.

title = "Nexus gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Документация и тестовые фикстуры содержат плейсхолдеры (ghp_xxx, base_url-примеры), не секреты"
paths = [
    '''docs/.*''',
    '''.*\.md$''',
    '''.*/mock/.*''',
    '''.*/__mocks__/.*''',
    '''.*\.test\.(ts|tsx)$''',
    '''apps/desktop/src-tauri/.*/tests?\.rs$''',
]
regexes = [
    # Заведомо фейковые плейсхолдер-токены в inline-тестах (#[cfg(test)] прямо в mod.rs, не отдельный
    # tests.rs — путь-allowlist их не ловит). Последовательность 0123456789… — настоящий секрет так не
    # выглядит. Напр. git/mod.rs: ghp_0123456789012345678901234567890123ab.
    '''0123456789012345678901234567890123''',
]

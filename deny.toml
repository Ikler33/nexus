# cargo-deny — supply-chain gate ядра (V1.1, ревью B6 / AC-Q-5).
# Проверяет 4 среза: advisories (RUSTSEC-уязвимости), лицензии, дубли/баны, источники.
# Запуск локально: `cargo deny check` (из корня воркспейса). В CI — job `security`.
# Принцип «no silent caps»: любое `ignore`/`exceptions`/allow-list — с комментарием-обоснованием.

[graph]
# Проверяем все таргеты (как clippy --all-targets); фичи по умолчанию из манифеста.
all-features = false

[advisories]
version = 2
# Уязвимости (RUSTSEC vulnerability) и unsound → ошибка (дефолт v2). Отозванные крейты — блокируем.
yanked = "deny"
# unmaintained-адвизори: флагуем только для ПРЯМЫХ зависимостей воркспейса (на них можем повлиять).
# Глубокие транзитивные (gtk-rs/unic/proc-macro-error через Tauri/usearch) — вне нашего контроля,
# апстрим Tauri ещё на GTK3; «no silent caps»: политика осознанная, см. docs/dev/security.md.
unmaintained = "workspace"
# Точечные исключения известных адвизори — добавлять ТОЛЬКО с обоснованием (no silent caps).
# RUSTSEC-2026-0194/0195 (quick-xml < 0.41: O(N²)-атрибуты / неограниченная память xmlns — DoS-класс).
# ПРЯМОЙ путь ЗАКРЫТ: nexus-desktop мигрирован на quick-xml 0.41 (news/parse.rs — сущности теперь
# приходят Event::GeneralRef, семантика парсинга RSS/Atom сохранена; см. CHANGELOG). ОСТАЁТСЯ ТОЛЬКО
# транзитивная quick-xml 0.39.4 через plist v1.9.0 ← tauri 2.11.2 (`cargo tree -p quick-xml@0.39.4 -i`):
# tauri парсит локальные .plist (Info.plist сборки/бандла), НЕ удалённый недоверенный XML — экспозиция
# DoS минимальна. Своего кода на этом пути нет — ждём апстрим-бампа plist/tauri на quick-xml 0.41.
# Ignore узкий/осознанный, снять при апстрим-бампе tauri. Проверено 2026-07-09 (advisory всё ещё
# срабатывает только на 0.39.4; на 0.41 — нет).
ignore = [
    { id = "RUSTSEC-2026-0194", reason = "quick-xml<0.41 DoS; прямой путь закрыт (мигрирован на 0.41); остаётся ТОЛЬКО транзитивная 0.39.4 via plist←tauri (локальные plist) — ждём апстрим-бамп tauri. Проверено 2026-07-09" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml<0.41 DoS; прямой путь закрыт (мигрирован на 0.41); остаётся ТОЛЬКО транзитивная 0.39.4 via plist←tauri (локальные plist) — ждём апстрим-бамп tauri. Проверено 2026-07-09" },
]

[licenses]
version = 2
# Permissive-набор. Проект — MIT; зависимости — стандартные пермиссивные лицензии.
# Список выверяется по фактическому дереву (см. журнал V1.1); расширяем только осознанно.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",            # cssparser/selectors — weak (file-level) copyleft, разрешено
    "CDLA-Permissive-2.0", # webpki-roots: данные CA-бандла Mozilla, permissive data-лицензия
]
confidence-threshold = 0.8
# Крейты с нестандартным SPDX (напр. `ring`) уточняются через [[licenses.clarify]] ниже по факту.
exceptions = []

[bans]
# Дубли версий — предупреждение (норма для большого дерева; не блокируем на старте).
multiple-versions = "warn"
wildcards = "warn"
# Явные баны/разрешения добавляются по необходимости.
allow = []
deny = []

[sources]
# Только crates.io. Любой неизвестный реестр/git-источник → ошибка (анти-supply-chain).
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
